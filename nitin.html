<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Portfolio</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 0;
            background-color: #f4f4f4;
            text-align: center;
        }

        header {
            background-color: #333;
            color: white;
            padding: 20px 0;
        }

        .container {
            padding: 20px;
        }

        .profile-img {
            width: 150px;
            height: 150px;
            background-color: #ccc;
            border-radius: 50%;
            display: inline-block;
            line-height: 150px;
            color: #555;
            font-weight: bold;
            margin-top: 20px;
        }

        h2 {
            color: #333;
        }

        .skills {
            margin-top: 20px;
        }

        .skills ul {
            list-style: none;
            padding: 0;
        }

        .skills li {
            background: #333;
            color: white;
            margin: 5px;
            padding: 10px;
            display: inline-block;
            border-radius: 5px;
        }

        footer {
            margin-top: 30px;
            background: #333;
            color: white;
            padding: 10px 0;
        }
    </style>
</head>
<body>

    <header>
        <h1>Deepak Kumar</h1>
        <p>Welcome to my portfolio</p>

    <div class="container">

        <div class="profile-img">
            Photo
        </div>

        <!-- About Section -->
        <h2>About Me</h2>
        <p>Hello! I am a student and aspiring developer. I love learning new technologies and building projects.</p>

        <!-- Skills Section -->
        <div class="skills">
            <h2>My Skills</h2>
            <ul>
                <li>HTML</li>
                <li>CSS</li>
                <li>JavaScript</li>
                <li>C Programming</li>

    <footer>

    </footer>

</html>
